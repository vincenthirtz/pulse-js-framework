name: PR Preview

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main, develop]

# Cancel in-progress runs for same PR
concurrency:
  group: pr-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  pull-requests: write
  contents: read

jobs:
  # Skip preview for docs-only or CI-only changes
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      should_preview: ${{ steps.filter.outputs.src }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Detect changed paths
        uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3
        id: filter
        with:
          filters: |
            src:
              - 'runtime/**'
              - 'compiler/**'
              - 'cli/**'
              - 'loader/**'
              - 'docs/**'
              - 'examples/**'
              - 'package.json'
              - 'package-lock.json'

  preview:
    name: Deploy PR Preview
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: changes
    if: needs.changes.outputs.should_preview == 'true'

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build for preview
        run: npm run build:netlify

      - name: Deploy to Netlify Preview
        id: netlify
        uses: nwtgck/actions-netlify@4cbaf4c08f1a7bfa537d6113472ef4424e4eb654 # v3
        with:
          publish-dir: './dist'
          production-deploy: false
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: 'PR #${{ github.event.pull_request.number }} - ${{ github.event.pull_request.title }}'
          alias: pr-${{ github.event.pull_request.number }}
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}

      - name: Comment PR with preview URL
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          script: |
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            // Find existing preview comment
            const botComment = comments.find(comment =>
              comment.user.type === 'Bot' &&
              comment.body.includes('Preview Deployment')
            );

            const previewUrl = '${{ steps.netlify.outputs.deploy-url }}';
            const commitSha = context.sha.substring(0, 7);

            const commentBody = `
            ## 🚀 Preview Deployment Ready!

            | Name | Link |
            |------|------|
            | 🔍 Preview | [Visit Preview](${previewUrl}) |
            | 📝 Commit | [\`${commitSha}\`](https://github.com/${{ github.repository }}/commit/${{ github.sha }}) |

            ---

            <sub>Built with Netlify • Updated: ${new Date().toUTCString()}</sub>
            `;

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: commentBody
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: commentBody
              });
            }

      - name: Create deployment summary
        run: |
          echo "## 🎉 PR Preview Deployed!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🔗 **Preview URL**: ${{ steps.netlify.outputs.deploy-url }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📋 Quick Links" >> $GITHUB_STEP_SUMMARY
          echo "- [View Preview](${{ steps.netlify.outputs.deploy-url }})" >> $GITHUB_STEP_SUMMARY
          echo "- [Netlify Logs](${{ steps.netlify.outputs.logs }})" >> $GITHUB_STEP_SUMMARY
          echo "- [PR #${{ github.event.pull_request.number }}](${{ github.event.pull_request.html_url }})" >> $GITHUB_STEP_SUMMARY
