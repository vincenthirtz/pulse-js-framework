name: E2E Tests

on:
  # Manual trigger
  workflow_dispatch:
    inputs:
      url:
        description: 'Base URL to test (e.g., https://pulse-js.fr)'
        required: true
        default: 'https://pulse-js.fr'

  # Scheduled runs (weekly on production)
  schedule:
    - cron: '0 2 * * 1' # Every Monday at 2 AM UTC

  # On main branch pushes (optional)
  # push:
  #   branches: [main]

permissions:
  contents: read

jobs:
  e2e:
    name: Run E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install E2E test dependencies
        run: npm install --no-save @playwright/test @axe-core/playwright

      - name: Get Playwright version
        id: playwright-version
        run: echo "PLAYWRIGHT_VERSION=$(npx playwright --version | awk '{print $2}')" >> $GITHUB_OUTPUT

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ matrix.browser }}-${{ steps.playwright-version.outputs.PLAYWRIGHT_VERSION }}

      - name: Cache Playwright system dependencies
        id: sysdeps-cache
        uses: actions/cache@v4
        with:
          path: ~/playwright-sysdeps
          key: playwright-sysdeps-${{ steps.playwright-version.outputs.PLAYWRIGHT_VERSION }}
          restore-keys: playwright-sysdeps-

      - name: Restore cached apt packages
        if: steps.sysdeps-cache.outputs.cache-hit == 'true'
        run: sudo cp ~/playwright-sysdeps/*.deb /var/cache/apt/archives/ 2>/dev/null || true

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: Install Playwright system deps only
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps ${{ matrix.browser }}

      - name: Save apt packages to cache
        if: steps.sysdeps-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/playwright-sysdeps
          cp /var/cache/apt/archives/*.deb ~/playwright-sysdeps/ 2>/dev/null || true

      - name: Run E2E tests
        id: e2e
        env:
          PLAYWRIGHT_BASE_URL: ${{ github.event.inputs.url || 'https://pulse-js.fr' }}
        run: npx playwright test --project=${{ matrix.browser }} --grep-invert "Examples Health Check"

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.browser }}
          path: playwright-report/
          retention-days: 30

      - name: Upload test results summary
        if: always()
        run: |
          echo "## 🧪 E2E Test Results (${{ matrix.browser }})" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Base URL**: ${{ github.event.inputs.url || 'https://pulse-js.fr' }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.e2e.outcome }}" = "success" ]; then
            echo "✅ All tests passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Some tests failed" >> $GITHUB_STEP_SUMMARY
            echo "- View [detailed report](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> $GITHUB_STEP_SUMMARY
          fi

  # ──────────────────────────────────────────────────────────────────────
  # Examples Health Check
  # Starts the Pulse dev server for each example project and verifies
  # it loads and renders without JavaScript errors.
  # No example-level npm install — only the framework's own dependencies.
  # ──────────────────────────────────────────────────────────────────────
  examples:
    name: Examples Health Check
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install E2E test dependencies
        run: npm install --no-save @playwright/test

      - name: Get Playwright version
        id: playwright-version
        run: echo "PLAYWRIGHT_VERSION=$(npx playwright --version | awk '{print $2}')" >> $GITHUB_OUTPUT

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ steps.playwright-version.outputs.PLAYWRIGHT_VERSION }}

      - name: Cache Playwright system dependencies
        id: sysdeps-cache
        uses: actions/cache@v4
        with:
          path: ~/playwright-sysdeps
          key: playwright-sysdeps-${{ steps.playwright-version.outputs.PLAYWRIGHT_VERSION }}
          restore-keys: playwright-sysdeps-

      - name: Restore cached apt packages
        if: steps.sysdeps-cache.outputs.cache-hit == 'true'
        run: sudo cp ~/playwright-sysdeps/*.deb /var/cache/apt/archives/ 2>/dev/null || true

      - name: Install Playwright Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system deps only
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Save apt packages to cache
        if: steps.sysdeps-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/playwright-sysdeps
          cp /var/cache/apt/archives/*.deb ~/playwright-sysdeps/ 2>/dev/null || true

      - name: Run examples health check
        id: examples
        run: npx playwright test tests/e2e/examples.spec.js --project=chromium

      - name: Upload examples report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: examples-health-report
          path: playwright-report/
          retention-days: 30

      - name: Upload examples summary
        if: always()
        run: |
          echo "## 🧩 Examples Health Check" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Tested **19 example projects** with Pulse dev server (no external dependencies)." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.examples.outcome }}" = "success" ]; then
            echo "✅ All examples load and render without errors" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Some examples failed" >> $GITHUB_STEP_SUMMARY
            echo "- View [detailed report](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> $GITHUB_STEP_SUMMARY
          fi

  notify:
    name: Notify Results
    needs: [e2e, examples]
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Create overall summary
        run: |
          echo "# 📊 E2E Test Suite Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Tested URL: **${{ github.event.inputs.url || 'https://pulse-js.fr' }}**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| E2E (docs site) | ${{ needs.e2e.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Examples Health | ${{ needs.examples.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "View individual reports in the artifacts." >> $GITHUB_STEP_SUMMARY
