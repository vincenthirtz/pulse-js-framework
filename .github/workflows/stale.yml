name: Close Stale Issues

on:
  schedule:
    - cron: '0 0 * * 0' # Every Sunday at midnight UTC

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    name: Close Stale Issues & PRs
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Mark and close stale issues/PRs
        uses: actions/stale@5bef64f19d7facfb25b37b414482c7164d639639 # v9
        with:
          stale-issue-message: >
            This issue has been automatically marked as stale because it has not had
            recent activity (90 days). It will be closed in 14 days if no further
            activity occurs. If this issue is still relevant, please comment to keep it open.
          stale-pr-message: >
            This PR has been automatically marked as stale because it has not had
            recent activity (60 days). It will be closed in 14 days if no further
            activity occurs.
          close-issue-message: 'Closed due to inactivity. Feel free to reopen if still relevant.'
          close-pr-message: 'Closed due to inactivity. Feel free to reopen if still relevant.'
          days-before-issue-stale: 90
          days-before-pr-stale: 60
          days-before-issue-close: 14
          days-before-pr-close: 14
          stale-issue-label: 'stale'
          stale-pr-label: 'stale'
          exempt-issue-labels: 'pinned,security,bug,enhancement'
          exempt-pr-labels: 'pinned,security,release'
          exempt-all-milestones: true
          operations-per-run: 50
